<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्वच्छम्‌ // LAUNDRY CONTROL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arya:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-sand: #F9F4EB; /* Sandstone/Parchment */
            --panel-bg: #FFF9F0;
            --text-dark: #3E2723; /* Deep Earth Brown */
            --accent-red: #8B3A33; /* Terracotta */
            --accent-green: #2E7D32; /* Mehendi Green */
            --border-color: #8B3A33;
        }

        body {
            background-color: var(--bg-sand);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            color: var(--text-dark);
            font-family: 'Lora', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: var(--panel-bg);
            border: 4px double var(--border-color);
            padding: 30px;
            box-sizing: border-box;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(139, 58, 51, 0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Arya', sans-serif;
            font-size: 3.5rem;
            color: var(--accent-red);
            margin: 0 0 5px 0;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin: 0;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--accent-red);
            margin-bottom: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: "❖ ";
            margin-right: 8px;
        }

        .panel {
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 30px;
            background: #FAFAFA;
            transition: opacity 0.3s ease;
        }

        input[type="text"] {
            width: 100%;
            background-color: transparent;
            border: none;
            border-bottom: 2px dashed var(--accent-red);
            color: var(--text-dark);
            font-family: 'Lora', serif;
            font-size: 2.2rem;
            text-align: center;
            letter-spacing: 5px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-transform: uppercase;
            outline: none;
            font-weight: bold;
        }

        input[type="text"]::placeholder {
            color: #BCAAA4;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: normal;
        }

        button {
            background-color: var(--accent-red);
            color: var(--bg-sand);
            border: 2px solid var(--accent-red);
            padding: 15px;
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 2px 2px 0px var(--text-dark);
        }

        button:hover:not(:disabled) {
            background-color: var(--text-dark);
            border-color: var(--text-dark);
            color: var(--bg-sand);
        }

        button:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px transparent;
        }

        button:disabled {
            background-color: #D7CCC8;
            border-color: #D7CCC8;
            color: #8D6E63;
            box-shadow: none;
            cursor: not-allowed;
        }

        .locked { opacity: 0.4; pointer-events: none; }

        .cycle-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .timer-display {
            font-size: 2.8rem;
            text-align: center;
            color: var(--accent-red);
            margin-top: 20px;
            font-weight: bold;
        }

        .log-window {
            height: 120px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 10px;
            background: #FFF;
            border: 1px inset var(--border-color);
        }

        .log-window .success { color: var(--accent-green); font-weight: bold;}
        .log-window .error { color: #D32F2F; font-weight: bold;}
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-sand); }
        ::-webkit-scrollbar-thumb { background: var(--accent-red); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>स्वच्छम्‌</h1>
            <p class="subtitle">यन्त्र नियन्त्रण // MACHINE CONTROL</p>
        </header>

        <div class="section-title">प्रवेश मुद्रा // ACCESS TOKEN</div>
        <div class="panel" id="tokenPanel">
            <input type="text" id="tokenInput" placeholder="ENTER TOKEN" maxlength="9">
            <button id="verifyBtn">सत्यापित करें // VERIFY</button>
        </div>

        <div class="section-title">यन्त्र संपर्क // BLUETOOTH</div>
        <div class="panel locked" id="btPanel">
            <p style="text-align: center; margin-top:0; font-weight:bold;" id="btStatus">NOT CONNECTED</p>
            <button id="connectBtn">CONNECT TO WASHER</button>
        </div>

        <div class="section-title">चक्र चुनें // SELECT CYCLE</div>
        <div class="panel locked" id="cyclePanel">
            <div class="cycle-grid">
                <button class="cycleBtn" data-time="25">शीघ्र // 25 MIN</button>
                <button class="cycleBtn" data-time="40">पूर्ण // 40 MIN</button>
            </div>
            <div class="timer-display" id="timerOutput">--:--</div>
        </div>

        <div class="section-title" style="justify-content: space-between;">
            <span>पंजीका // LOG</span>
            <span style="cursor:pointer; font-size: 0.9rem;" id="clearLog">CLEAR</span>
        </div>
        <div class="log-window" id="logConsole">
            • स्वागतम् (Welcome)<br>
            • Please enter your token to begin...<br>
        </div>
    </div>

    <script>
        const tokenInput = document.getElementById('tokenInput');
        const verifyBtn = document.getElementById('verifyBtn');
        const btPanel = document.getElementById('btPanel');
        const cyclePanel = document.getElementById('cyclePanel');
        const logConsole = document.getElementById('logConsole');
        const connectBtn = document.getElementById('connectBtn');
        const btStatus = document.getElementById('btStatus');
        const cycleBtns = document.querySelectorAll('.cycleBtn');
        const timerOutput = document.getElementById('timerOutput');

        let isUnlocked = false;
        let isConnected = false;

        // Auto-format token
        tokenInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
            if (val.length > 4) val = val.substring(0, 4) + '-' + val.substring(4, 8);
            e.target.value = val;
        });

        function addLog(msg, type = '') {
            let spanClass = type ? `class="${type}"` : '';
            logConsole.innerHTML += `• <span ${spanClass}>${msg}</span><br>`;
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        verifyBtn.addEventListener('click', () => {
            if (isUnlocked) return;
            const token = tokenInput.value;
            const tokenRegex = /^[A-Z0-9]{4}-[A-Z0-9]{4}$/;

            addLog(`Verifying token...`);
            setTimeout(() => {
                if (tokenRegex.test(token)) {
                    addLog('Access Granted. (अनुमति प्राप्त)', 'success');
                    isUnlocked = true;
                    tokenInput.disabled = true;
                    verifyBtn.disabled = true;
                    verifyBtn.innerText = 'UNLOCKED';
                    btPanel.classList.remove('locked');
                } else {
                    addLog('Access Denied. Invalid Token.', 'error');
                    tokenInput.value = '';
                }
            }, 600);
        });

        connectBtn.addEventListener('click', () => {
            addLog('Searching for Swachham Unit...');
            connectBtn.innerText = 'SCANNING...';
            setTimeout(() => {
                isConnected = true;
                btStatus.innerText = 'CONNECTED: SWACHHAM-01';
                btStatus.style.color = 'var(--accent-green)';
                connectBtn.disabled = true;
                connectBtn.innerText = 'PAIRED';
                cyclePanel.classList.remove('locked');
                addLog('Washer connected successfully.', 'success');
            }, 1000);
        });

        cycleBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (!isConnected) return;
                const time = e.target.getAttribute('data-time');
                addLog(`Cycle started: ${time} Minutes.`, 'success');
                timerOutput.innerText = `${time}:00`;
                timerOutput.style.color = 'var(--accent-green)';
                cycleBtns.forEach(b => b.disabled = true);
            });
        });

        document.getElementById('clearLog').addEventListener('click', () => {
            logConsole.innerHTML = '• Log cleared.<br>';
            if (!isUnlocked) addLog('Please enter your token to begin...');
        });
    </script>
</body>
</html>
